<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-card glass-card">
      <i class="ph ph-wallet login-icon"></i>
      <h2>Welcome Back</h2>
      <p>Enter your username to access your personal dashboard.</p>
      <form id="login-form">
        <div class="input-wrapper">
          <i class="ph ph-user"></i>
          <input type="text" id="username" placeholder="Username" required autocomplete="off" />
        </div>
        <button type="submit" class="btn-submit">Login</button>
      </form>
    </div>
  </div>

  <div class="app-container hidden" id="main-app">
    <header class="app-header">
      <div class="header-title">
        <h1><i class="ph ph-wallet"></i> <span id="header-username">Expense Tracker</span></h1>
      </div>
      <button id="btn-logout" class="btn-icon">
        <i class="ph ph-sign-out"></i> Logout
      </button>
    </header>

    <div class="app-grid">
      <!-- Left Column: Dashboard & Add Form -->
      <div class="left-col">
        <div class="dashboard glass-card">
          <div class="balance-container">
            <h2>Net Balance</h2>
            <h3 id="net-balance">₹0.00</h3>
          </div>
          
          <div class="ratio-bar-container">
            <div id="ratio-bar-fill" class="ratio-bar-fill"></div>
          </div>
          
          <div class="summary-container">
            <div class="summary-item income">
              <h4><i class="ph ph-trend-up"></i> Income</h4>
              <p id="total-income">+₹0.00</p>
            </div>
            <div class="summary-item expense">
              <h4><i class="ph ph-trend-down"></i> Expense</h4>
              <p id="total-expense">-₹0.00</p>
            </div>
          </div>
        </div>

        <section class="add-transaction glass-card">
          <h3><i class="ph ph-plus-circle"></i> Add Transaction</h3>
          <form id="transaction-form">
            <div id="form-error" class="error-toast hidden">
              <i class="ph ph-warning-circle"></i> <span id="error-text"></span>
            </div>
            
            <div class="form-group">
              <label for="desc">Description</label>
              <div class="input-wrapper">
                <i class="ph ph-text-aa"></i>
                <input type="text" id="desc" placeholder="e.g. Salary, Groceries" />
              </div>
            </div>
            
            <div class="form-group">
              <label for="amount">Amount</label>
              <div class="input-wrapper">
                <i class="ph ph-currency-inr"></i>
                <input type="number" id="amount" placeholder="0.00" step="0.01" />
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="date">Date</label>
                <div class="input-wrapper">
                  <input type="date" id="date" />
                </div>
              </div>
              
              <div class="form-group">
                <label for="type">Type</label>
                <div class="input-wrapper">
                  <select id="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                  </select>
                </div>
              </div>
            </div>
            
            <button type="submit" class="btn-submit">Add Transaction</button>
          </form>
        </section>
      </div>

      <!-- Right Column: Transaction List -->
      <div class="right-col">
        <section class="transaction-list-section glass-card">
          <h3><i class="ph ph-list-dashes"></i> Transactions</h3>
          <ul id="transaction-list" class="transaction-list">
            <!-- List items go here -->
          </ul>
          <div id="empty-state" class="empty-state">
            <i class="ph ph-receipt"></i>
            <p>No transactions yet.</p>
          </div>
        </section>
      </div>
    </div>
  </div>
  
  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
